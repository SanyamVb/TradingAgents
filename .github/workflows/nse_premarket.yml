name: NSE Pre-Market Analysis

on:
  schedule:
    # Target: results in hand by 8:45 AM IST (market opens 9:15 AM IST).
    # Scheduled at 02:30 UTC = 08:00 AM IST, Mon-Fri.
    # GitHub Actions scheduled runs are frequently delayed 30-45 min (sometimes hours)
    # during peak load, so the 45-min buffer before 8:45 AM IST absorbs typical slippage.
    # Also off the top/quarter of the hour to reduce contention.
    - cron: '30 2 * * 1-5'
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Space-separated NSE tickers (e.g. RELIANCE.NS TCS.NS). Leave blank for defaults.'
        required: false
        default: ''

jobs:
  analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 10 tickers × ~3 min each = ~30 min; 60 min gives headroom

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pandas-market-calendars>=4.3

      - name: Run pre-market analysis
        id: analysis
        run: |
          # Use manual tickers if provided via workflow_dispatch, else defaults
          TICKERS="${{ github.event.inputs.tickers }}"
          if [ -z "$TICKERS" ]; then
            python scripts/india_premarket.py | tee analysis_output.txt
          else
            python scripts/india_premarket.py $TICKERS | tee analysis_output.txt
          fi
        env:
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:     ${{ secrets.GOOGLE_API_KEY }}
          # LLM config — repo Variables override these defaults (Settings → Variables → Actions)
          TRADINGAGENTS_LLM_PROVIDER:  ${{ vars.TRADINGAGENTS_LLM_PROVIDER || 'anthropic' }}
          TRADINGAGENTS_DEEP_LLM:      ${{ vars.TRADINGAGENTS_DEEP_LLM || 'claude-sonnet-4-6' }}
          TRADINGAGENTS_QUICK_LLM:     ${{ vars.TRADINGAGENTS_QUICK_LLM || 'claude-haiku-4-5-20251001' }}
          TRADINGAGENTS_BACKEND_URL:   ${{ secrets.TRADINGAGENTS_BACKEND_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Upload analysis as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nse-analysis-${{ github.run_id }}
          path: analysis_output.txt
          retention-days: 30

      - name: Send Telegram notification
        if: success() && env.TELEGRAM_BOT_TOKEN != ''
        run: |
          OUTPUT=$(cat analysis_output.txt)
          # Telegram message limit is 4096 chars — trim if needed
          MESSAGE=$(echo "$OUTPUT" | tail -c 3900)
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$MESSAGE" \
            -d parse_mode="HTML"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
